function buildChartData(node, curveKey, stdKey) {

    const curve = n.kpi && n.kpi[curveKey];
    const kpiGroup = stdKey === 'kpi_60d' ? (n.kpi && n.kpi.kpi_60d) : (n.kpi && n.kpi.kpi_2y);
    const std = parseStd(kpiGroup && kpiGroup.Daily_Std);
    if (curve && curve.dates && curve.values && std > 0) {
      const normed = curve.values.map(v => v / std);
      const first = normed[0] || 0;
      curves.push({ name: n.name, dates: curve.dates, values: normed.map(v => v - first) });
    }
  }
  addCurve(node);
  if (node.children) node.children.forEach(addCurve);
  if (curves.length === 0) return null;
  let refDates = curves[0].dates;

  const N = refDates.length;
  const dateIndex = {};
  refDates.forEach((d, i) => dateIndex[d] = i);
  const aligned = curves.map(c => {
    const arr = new Array(N).fill(null);
    c.dates.forEach((d, i) => { if (dateIndex[d] !== undefined) arr[dateIndex[d]] = c.values[i]; });
    return { name: c.name, data: arr };

          <div class="card-kpi-row">
            ${kpiTableHtml('2Y KPI', ck2y)}
            ${kpiTableHtml('60D KPI', ck60d)}
          </div>
          ${imgExists ? '<img class="card-img" data-src="'+imgSrc+'" alt="'+child.name+'">' : ''}
        </div>
      </div>`;
    });
    cards += '</div>';
    node._sorted = sorted;
  }

  app.innerHTML = bc + compare + hero + cards;
  window.scrollTo(0, 0);
  if (hasChildren) {
    Object.keys(charts).forEach(k => delete charts[k]);
    requestAnimationFrame(() => {
      initChart('chart-60d', node, 'curve_60d', 'kpi_60d');
      initChart('chart-2y', node, 'curve_2y', 'kpi_2y');
    });
  }
}

let allExpanded = false;
function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.querySelector('.expand-btn');
  if (btn) btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.card').forEach(c => {
    if (allExpanded) {
      c.classList.add('expanded');
      const img = c.querySelector('img[data-src]');
      if (img) { img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
    } else {
      c.classList.remove('expanded');
    }
  });
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  const wasExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded');
  if (!wasExpanded) {
    const img = card.querySelector('img[data-src]');
    if (img) { img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
  }
}

async function drillDown(sortedIdx) {
  allExpanded = false;
  const child = currentNode._sorted[sortedIdx];
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Loading ' + child.name + '...</div>';
  const loaded = await loadNodeData(child.name);
  if (loaded) {
    navStack.push(currentNode);
    currentNode = loaded;
    location.hash = child.name;
    renderPage(currentNode);
  } else {
    navStack.push(currentNode);
    currentNode = child;
    location.hash = child.name;
    renderPage(currentNode);
  }
}

function navigateTo(stackIdx) {
  allExpanded = false;
  currentNode = navStack[stackIdx];
  navStack = navStack.slice(0, stackIdx);
  location.hash = currentNode === TREE ? '' : currentNode.name;
  renderPage(currentNode);
}

async function navigateToHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash && hash !== TREE.name) {
    const loaded = await loadNodeData(hash);
    if (loaded) {
      // Build nav stack by trying to load ancestors
      navStack = [TREE];
      currentNode = loaded;
      renderPage(currentNode);
      return;
    }
  }
  navStack = [];
  currentNode = TREE;
  renderPage(TREE);
}

navigateToHash();
window.addEventListener('hashchange', navigateToHash);
window.addEventListener('resize', () => { Object.keys(charts).forEach(id => drawChart(id)); });
</script>
