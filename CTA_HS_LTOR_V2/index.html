  aligned.forEach((c, ci) => {
    if (hidden.has(ci)) return;
    for (const v of c.data) { if (v !== null) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; } }
  });
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  const yPad = (yMax - yMin) * 0.08;
  yMin -= yPad; yMax += yPad;

  const xOf = i => pad.left + plotW * i / (N - 1);
  const yOf = v => pad.top + plotH * (1 - (v - yMin) / (yMax - yMin));

  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 0.5;
  const yTicks = 6;
  for (let i = 0; i <= yTicks; i++) {
    const y = pad.top + plotH * i / yTicks;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(pad.left, yOf(0)); ctx.lineTo(W - pad.right, yOf(0)); ctx.stroke();
    ctx.setLineDash([]);
  }

  st.paths = [];
  aligned.forEach((c, ci) => {
    if (hidden.has(ci)) { st.paths.push(null); return; }
    const isHover = (hoverIdx === ci);
    ctx.strokeStyle = COLORS[ci % COLORS.length];
    ctx.lineWidth = isHover ? 3.5 : (ci === 0 ? 2.5 : 1.5);
    ctx.globalAlpha = (hoverIdx !== undefined && hoverIdx !== -1 && !isHover) ? 0.25 : (ci === 0 ? 1.0 : 0.8);
    const pts = [];
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < N; i++) {
      if (c.data[i] === null) continue;
      const x = xOf(i), y = yOf(c.data[i]);
      pts.push({ x, y, i });
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke(); ctx.globalAlpha = 1.0;
    st.paths.push(pts);
  });

  ctx.fillStyle = '#888'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= yTicks; i++) {
    const val = yMax - (yMax - yMin) * i / yTicks;
    ctx.fillText(val.toFixed(1), pad.left - 6, pad.top + plotH * i / yTicks + 4);
  }
  ctx.fillStyle = '#888'; ctx.textAlign = 'center';
  const xStep = Math.max(1, Math.floor(N / 8));
  for (let i = 0; i < N; i += xStep) {
    const x = xOf(i);
    ctx.save(); ctx.translate(x, H - pad.bottom + 14); ctx.rotate(-0.4);
    ctx.fillText(refDates[i].slice(5), 0, 0); ctx.restore();
  }
  const xlast = xOf(N - 1);
  ctx.save(); ctx.translate(xlast, H - pad.bottom + 14); ctx.rotate(-0.4);
  ctx.fillText(refDates[N-1].slice(5), 0, 0); ctx.restore();

  if (hoverIdx !== undefined && hoverIdx >= 0 && !hidden.has(hoverIdx)) {
    const pts = st.paths[hoverIdx];
    if (pts && pts.length > 0) {
      const last = pts[pts.length - 1];
      const name = aligned[hoverIdx].name;
      ctx.font = 'bold 13px -apple-system, sans-serif';
      const tw = ctx.measureText(name).width;
      const tx = Math.min(last.x + 8, W - pad.right - tw - 12);
      const ty = Math.max(last.y - 8, pad.top + 16);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.strokeStyle = COLORS[hoverIdx % COLORS.length]; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(tx - 4, ty - 13, tw + 8, 18, 4);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = COLORS[hoverIdx % COLORS.length]; ctx.textAlign = 'left';
      ctx.fillText(name, tx, ty);
    }
  }
}

function hitTest(id, mx, my) {
  const st = charts[id];
  if (!st || !st.paths) return -1;
  let bestDist = 12, bestIdx = -1;
  st.paths.forEach((pts, ci) => {
    if (!pts || st.hidden.has(ci)) return;
    for (const p of pts) {
      const d = Math.sqrt((p.x - mx) ** 2 + (p.y - my) ** 2);
      if (d < bestDist) { bestDist = d; bestIdx = ci; }
    }
  });
  return bestIdx;
}

function buildLegend(id) {
  const st = charts[id];
  const el = document.getElementById(id + '-legend');
  if (!el || !st) return;
  el.innerHTML = st.aligned.map((c, ci) =>
    `<span class="compare-legend-item${st.hidden.has(ci) ? ' hidden' : ''}" data-ci="${ci}">
      <span class="compare-legend-swatch" style="background:${COLORS[ci % COLORS.length]}"></span>
      <span style="font-weight:600;">${c.name}</span>
    </span>`
  ).join('');
  el.querySelectorAll('.compare-legend-item').forEach(item => {
    item.addEventListener('click', () => {
      const ci = parseInt(item.dataset.ci);
      if (st.hidden.has(ci)) st.hidden.delete(ci); else st.hidden.add(ci);
      item.classList.toggle('hidden');
      drawChart(id);
    });
  });
}

function setupEvents(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  let lastHover = -1;
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = hitTest(id, e.clientX - rect.left, e.clientY - rect.top);
    if (idx !== lastHover) { lastHover = idx; drawChart(id, idx); }
  });
  canvas.addEventListener('mouseleave', () => { lastHover = -1; drawChart(id); });
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = hitTest(id, e.clientX - rect.left, e.clientY - rect.top);
    if (idx >= 0) {
      const st = charts[id];
      if (st.hidden.has(idx)) st.hidden.delete(idx); else st.hidden.add(idx);
      buildLegend(id); lastHover = -1; drawChart(id);
    }
  });
}

function initChart(id, node, curveKey, stdKey) {
  const data = buildChartData(node, curveKey, stdKey);
  if (!data) return;
  charts[id] = { ...data, pad: { top: 20, right: 20, bottom: 50, left: 60 }, hidden: new Set() };
  buildLegend(id);
  drawChart(id);
  setupEvents(id);
}

function renderPage(node) {
  const app = document.getElementById('app');
  const hasChildren = node.children && node.children.length > 0;

  let bc = '<div class="breadcrumb">';
  for (let i = 0; i < navStack.length; i++) {
    bc += `<a onclick="navigateTo(${i})">${navStack[i].name}</a><span class="sep">›</span>`;
  }
  bc += `<span class="current">${node.name}</span></div>`;

  let compare = '';
  if (hasChildren) {
    compare = `<div class="compare-box">
      <div class="compare-title">60D Normalized Equity (Equity / Daily_Std)</div>
      <canvas id="chart-60d" class="compare-canvas"></canvas>
      <div id="chart-60d-legend" class="compare-legend"></div>
    </div>
    <div class="compare-box">
      <div class="compare-title">2Y Normalized Equity (Equity / Daily_Std)</div>
      <canvas id="chart-2y" class="compare-canvas"></canvas>
      <div id="chart-2y-legend" class="compare-legend"></div>
    </div>`;
  }

  let hero = `<div class="hero">
    <div class="hero-header">
      <div class="hero-title">${node.name}${node.ratio ? ' <span style="font-size:14px;color:#7c3aed;">(Weight: '+node.ratio+'%)</span>' : ''}</div>
      <div class="hero-kpi">${heroKpiHtml(node.kpi)}</div>
    </div>
    <img class="hero-img" src="${node.image}" alt="${node.name}">
  </div>`;

  let cards = '';
  if (hasChildren) {
    const sorted = [...node.children].sort((a, b) => {
      const sa = parseFloat((a.kpi?.kpi_60d?.Ann_Sharpe || '0').replace('w','')) || 0;
      const sb = parseFloat((b.kpi?.kpi_60d?.Ann_Sharpe || '0').replace('w','')) || 0;
      return sb - sa;
    });

    cards = `<div class="section-header">
      <span class="section-title">Components (${sorted.length})</span>
      <button class="expand-btn" onclick="toggleExpandAll()">Expand All</button>
    </div><div class="cards">`;
    sorted.forEach((child, idx) => {
      const ck60d = (child.kpi && child.kpi.kpi_60d) || {};
      const ck2y = (child.kpi && child.kpi.kpi_2y) || {};
      const isDrillable = child.children && child.children.length > 0;
      const cardId = 'card-' + idx;
      const imgSrc = child.card_image || child.image;

      cards += `<div class="card" id="${cardId}">
        <div class="card-header" onclick="toggleCard('${cardId}')">
          <span class="card-rank">#${idx+1}</span>
          ${isDrillable
            ? '<span class="card-name drillable" onclick="event.stopPropagation(); drillDown('+idx+')">'+child.name+' <span class="drill-icon">▶</span></span>'
            : '<span class="card-name">'+child.name+'</span>'}
          <span class="card-ratio">${child.ratio||'-'}%</span>
          ${ck60d.Net_Profit ? '<span class="badge badge-profit">Profit: '+ck60d.Net_Profit+'</span>' : ''}
          ${ck60d.Ann_Sharpe ? '<span class="badge badge-sharpe">Sharpe: '+ck60d.Ann_Sharpe+'</span>' : ''}
          ${ck60d.Max_Drawdown ? '<span class="badge badge-dd">MaxDD: '+ck60d.Max_Drawdown+'</span>' : ''}
          <span class="card-arrow">▶</span>
        </div>
        <div class="card-body">
          <div class="card-kpi-row">
            ${kpiTableHtml('2Y KPI', ck2y)}
            ${kpiTableHtml('60D KPI', ck60d)}
          </div>
          <img class="card-img" data-src="${imgSrc}" alt="${child.name}">
        </div>
      </div>`;
    });
    cards += '</div>';
    node._sorted = sorted;
  }

  app.innerHTML = bc + compare + hero + cards;
  window.scrollTo(0, 0);
  if (hasChildren) {
    Object.keys(charts).forEach(k => delete charts[k]);
    requestAnimationFrame(() => {
      initChart('chart-60d', node, 'curve_60d', 'kpi_60d');
      initChart('chart-2y', node, 'curve_2y', 'kpi_2y');
    });
  }
}

let allExpanded = false;
function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.querySelector('.expand-btn');
  if (btn) btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.card').forEach(c => {
    if (allExpanded) {
      c.classList.add('expanded');
      const img = c.querySelector('img[data-src]');
      if (img) { img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
    } else {
      c.classList.remove('expanded');
    }
  });
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  const wasExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded');
  if (!wasExpanded) {
    const img = card.querySelector('img[data-src]');
    if (img) { img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
  }
}

function drillDown(sortedIdx) {
  allExpanded = false;
  const child = currentNode._sorted[sortedIdx];
  navStack.push(currentNode);
  currentNode = child;
  location.hash = child.name;
  renderPage(currentNode);
}

function navigateTo(stackIdx) {
  allExpanded = false;
  currentNode = navStack[stackIdx];
  navStack = navStack.slice(0, stackIdx);
  location.hash = currentNode === TREE ? '' : currentNode.name;
  renderPage(currentNode);
}

function findNode(node, name) {
  if (node.name === name) return [node, []];
  if (node.children) {
    for (const child of node.children) {
      const result = findNode(child, name);
      if (result) { result[1].unshift(node); return result; }
    }
  }
  return null;
}

function navigateToHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash && hash !== TREE.name) {
    const result = findNode(TREE, hash);
    if (result) {
      const [target, ancestors] = result;
      navStack = ancestors;
      currentNode = target;
      renderPage(currentNode);
      return;
    }
  }
  navStack = [];
  currentNode = TREE;
  renderPage(TREE);
}

navigateToHash();
window.addEventListener('hashchange', navigateToHash);
window.addEventListener('resize', () => { Object.keys(charts).forEach(id => drawChart(id)); });
</script>
