function renderNavTree(node, container, depth) {
  const item = document.createElement('div');
  item.className = 'nav-item';
  item.style.paddingLeft = (12 + depth * 16) + 'px';
  item.dataset.name = node.name;

  const toggle = document.createElement('span');
  toggle.className = 'nav-toggle' + (node.children.length > 0 ? '' : ' empty');
  toggle.textContent = '▶';
  item.appendChild(toggle);

  const label = document.createElement('span');
  label.textContent = node.name;
  label.style.overflow = 'hidden';
  label.style.textOverflow = 'ellipsis';
  item.appendChild(label);
  item.title = node.name;

  container.appendChild(item);

  let childrenDiv = null;
  if (node.children.length > 0) {
    childrenDiv = document.createElement('div');
    childrenDiv.className = 'nav-children';
    container.appendChild(childrenDiv);
    for (const child of node.children) {
      renderNavTree(child, childrenDiv, depth + 1);
    }
  }

  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!childrenDiv) return;
    const isExpanded = childrenDiv.classList.contains('expanded');
    if (isExpanded) {
      childrenDiv.classList.remove('expanded');
      toggle.classList.remove('expanded');
    } else {
      childrenDiv.classList.add('expanded');
      toggle.classList.add('expanded');
    }
  });

  item.addEventListener('click', () => {
    navToName(node.name);
  });
}

function navToName(name) {
  if (name === TREE.name) {
    navStack = [];
    currentNode = TREE;
    location.hash = '';
    renderPage(currentNode);
    updateNavActive();
    return;
  }
  const loaded = loadNodeData(name);
  if (!loaded) return;
  const ancestors = [];
  let cur = name;
  while (PARENT_MAP[cur]) {
    ancestors.unshift(PARENT_MAP[cur]);
    cur = PARENT_MAP[cur];
  }
  navStack = [TREE];
  for (let i = 1; i < ancestors.length; i++) {
    const anc = loadNodeData(ancestors[i]);
    if (anc) navStack.push(anc);
  }
  currentNode = loaded;
  location.hash = name;
  renderPage(currentNode);
  updateNavActive();
}

function updateNavActive() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === currentNode.name);
  });
  // Auto-expand ancestors in sidebar
  const ancestors = new Set();
  let cur = currentNode.name;
  while (PARENT_MAP[cur]) {
    ancestors.add(PARENT_MAP[cur]);
    cur = PARENT_MAP[cur];
  }
  ancestors.add(TREE.name);
  document.querySelectorAll('.nav-item').forEach(el => {
    if (ancestors.has(el.dataset.name)) {
      const next = el.nextElementSibling;
      if (next && next.classList.contains('nav-children')) {
        next.classList.add('expanded');
        el.querySelector('.nav-toggle')?.classList.add('expanded');
      }
    }
  });
  // Auto-scroll sidebar to active item
  const activeEl = document.querySelector('.nav-item.active');
  if (activeEl) {
    activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function initSidebar() {

}

function hashUrl(url) {
  const h = FILE_HASHES[url];
  return url + '?v=' + (h || Date.now());
}

async function fetchRetry(url, retries) {
  for (let i = 0; i <= retries; i++) {
    try {
      const ac = new AbortController();
      const tid = setTimeout(() => ac.abort(), 8000);
      const r = await fetch(url, {signal: ac.signal});
      clearTimeout(tid);
      if (r.ok) return await r.json();
      if (r.status === 404) return null;
    } catch(e) {}
    if (i < retries) await new Promise(r => setTimeout(r, 500 * (i + 1)));
  }
  return null;
}

function loadNodeData(name) {
  if (nodeCache[name]) return nodeCache[name];
  const data = ALL_DATA[name] || null;
  if (data) nodeCache[name] = data;
  return data;
}

async function loadChartData(name) {
  if (chartCache[name]) return chartCache[name];
  const data = await fetchRetry(hashUrl('charts/' + encodeURIComponent(name) + '.json'), 2);
  if (data) chartCache[name] = data;
  return data;
}

function fmt4(val) {
  if (!val) return '';
  const s = val.replace('w','');
  const n = parseFloat(s);
  if (isNaN(n)) return val;
  return n.toPrecision(4) + (val.includes('w') ? 'w' : '');
}

function fmtPct1(val) {
  if (val === null || val === undefined || val === '') return '';
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  return n.toFixed(1);
}

function parseStd(val) {
  if (!val) return 0;
  const s = val.replace('w','');
  const n = parseFloat(s);
  if (isNaN(n) || n === 0) return 0;
  return val.includes('w') ? n * 10000 : n;
}

function kpiTableHtml(label, kpi) {
  if (!kpi || Object.keys(kpi).length === 0) return '';
  let rows = '';
  for (let i = 0; i < KPI_KEYS.length; i += 2) {
    const k1 = KPI_KEYS[i], k2 = KPI_KEYS[i+1];
    rows += '<tr>';
    rows += `<td class="kpi-label">${k1}</td><td class="kpi-val">${kpi[k1]||'-'}</td>`;
    if (k2) rows += `<td class="kpi-label">${k2}</td><td class="kpi-val">${kpi[k2]||'-'}</td>`;
    rows += '</tr>';
  }
  return `<table class="kpi-table"><tr><th colspan="4">${label}</th></tr>${rows}</table>`;
}

const charts = {};

function drawChart(id, hoverCol, highlightIdx) {
  const st = charts[id];
  if (!st) return;
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const { aligned, refDates, N, pad, hidden } = st;
  const ctx = canvas.getContext('2d');

  const W = canvas.clientWidth;
  const H = chartHeight();
  canvas.width = W * dpr; canvas.height = H * dpr;

  ctx.scale(dpr, dpr);
  const plotW = W - pad.left - pad.right;

  });

  const xOf = i => pad.left + plotW * i / (N - 1);

  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 0.5;

  for (let i = 0; i <= yTicks; i++) {
    const y = pad.top + plotH * i / yTicks;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(pad.left, yOf(0)); ctx.lineTo(W - pad.right, yOf(0)); ctx.stroke();
    ctx.setLineDash([]);
  }

  st.paths = [];
  aligned.forEach((c, ci) => {
    if (hidden.has(ci)) { st.paths.push(null); return; }
    const isHL = (highlightIdx === ci);
    ctx.strokeStyle = COLORS[ci % COLORS.length];
    ctx.lineWidth = isHL ? 3.5 : (ci === 0 ? 2.5 : 1.5);
    ctx.globalAlpha = (highlightIdx !== undefined && highlightIdx >= 0 && !isHL) ? 0.15 : (ci === 0 ? 1.0 : 0.8);
    const pts = [];
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < N; i++) {
      if (c.data[i] === null) continue;
      const x = xOf(i), y = yOf(c.data[i]);
      pts.push({ x, y, i });
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }

    st.paths.push(pts);

    const val = yMax - (yMax - yMin) * i / yTicks;
    ctx.fillText(val.toFixed(1), pad.left - 6, pad.top + plotH * i / yTicks + 4);
  }
  ctx.fillStyle = '#888'; ctx.textAlign = 'center';
  const xStep = Math.max(1, Math.floor(N / 8));
  for (let i = 0; i < N; i += xStep) {
    const x = xOf(i);
    ctx.save(); ctx.translate(x, H - pad.bottom + 14); ctx.rotate(-0.4);
    ctx.fillText(refDates[i].slice(5), 0, 0); ctx.restore();

  ctx.save(); ctx.translate(xlast, H - pad.bottom + 14); ctx.rotate(-0.4);

      ctx.beginPath(); ctx.arc(hx, y, 3.5, 0, Math.PI * 2); ctx.fill();

}

function getColFromX(id, mx) {
  const st = charts[id];
  if (!st) return -1;
  const canvas = document.getElementById(id);
  if (!canvas) return -1;
  const { N, pad } = st;
  const W = canvas.clientWidth;
  const plotW = W - pad.left - pad.right;
  const col = Math.round((mx - pad.left) / plotW * (N - 1));
  if (col < 0 || col >= N || mx < pad.left || mx > W - pad.right) return -1;
  return col;
}

  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'chart-tooltip';
    canvas.parentElement.style.position = 'relative';
    canvas.parentElement.appendChild(tip);
  }
  return tip;
}

function buildTooltipHtml(id, col) {
  const st = charts[id];
  if (!st || col < 0) return null;
  const { aligned, refDates, hidden } = st;
  const rows = [];
  aligned.forEach((c, ci) => {
    if (hidden.has(ci) || c.data[col] === null) return;
    rows.push({ name: c.name, val: c.data[col], color: COLORS[ci % COLORS.length] });
  });
  rows.sort((a, b) => b.val - a.val);
  if (rows.length === 0) return null;
  let html = `<div class="tt-date">${refDates[col]}</div>`;
  for (const r of rows) {
    html += `<div class="tt-row"><span class="tt-swatch" style="background:${r.color}"></span><span class="tt-name">${r.name}</span><span class="tt-val">${r.val.toFixed(2)}</span></div>`;
  }
  return html;
}

function positionTooltip(tip, canvas, mx, my) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();
  const tipX = mx + canvasRect.left - rect.left;
  const tipY = my + canvasRect.top - rect.top;
  tip.style.top = Math.max(0, tipY - 20) + 'px';
  if (tipX + 220 < rect.width) {
    tip.style.left = (tipX + 16) + 'px'; tip.style.right = 'auto';
  } else {
    tip.style.left = 'auto'; tip.style.right = (rect.width - tipX + 16) + 'px';
  }
}

function showTooltip(id, col, mx, my) {
  const tip = getOrCreateTooltip(id);
  if (!tip) return;
  if (tip.classList.contains('pinned')) return;
  if (col < 0) { tip.style.display = 'none'; return; }
  const html = buildTooltipHtml(id, col);
  if (!html) { tip.style.display = 'none'; return; }
  tip.innerHTML = html;
  tip.style.display = 'block';
  positionTooltip(tip, document.getElementById(id), mx, my);
}

function pinTooltip(id, col, mx, my) {
  const tip = getOrCreateTooltip(id);
  if (!tip) return;
  // If already pinned, unpin
  if (tip.classList.contains('pinned')) {
    tip.classList.remove('pinned');
    tip.style.display = 'none';
    drawChart(id);
    return;
  }
  if (col < 0) return;
  const html = buildTooltipHtml(id, col);
  if (!html) return;
  tip.innerHTML = '<div style="text-align:right;margin-bottom:4px;"><span class="tt-close" style="cursor:pointer;color:#999;font-size:16px;line-height:1;">&times;</span></div>' + html;
  tip.style.display = 'block';
  tip.classList.add('pinned');
  positionTooltip(tip, document.getElementById(id), mx, my);
  drawChart(id, col);
  tip.querySelector('.tt-close').addEventListener('click', (e) => {
    e.stopPropagation();
    tip.classList.remove('pinned');
    tip.style.display = 'none';
    drawChart(id);
  });
}

function buildLegend(id) {
  const st = charts[id];
  const el = document.getElementById(id + '-legend');
  if (!el || !st) return;
  el.innerHTML = st.aligned.map((c, ci) =>
    `<span class="compare-legend-item${st.hidden.has(ci) ? ' hidden' : ''}" data-ci="${ci}">
      <span class="compare-legend-swatch" style="background:${COLORS[ci % COLORS.length]}"></span>
      <span style="font-weight:600;">${c.name}${(c.display_ratio !== null && c.display_ratio !== undefined) ? ` (${fmtPct1(c.display_ratio)}%)` : ''}</span>
    </span>`
  ).join('');
  el.querySelectorAll('.compare-legend-item').forEach(item => {
    const ci = parseInt(item.dataset.ci);
    item.addEventListener('click', () => {
      if (st.hidden.has(ci)) st.hidden.delete(ci); else st.hidden.add(ci);
      item.classList.toggle('hidden');
      drawChart(id);
    });
    item.addEventListener('mouseenter', () => {
      item.classList.add('highlight');
      drawChart(id, undefined, ci);
    });
    item.addEventListener('mouseleave', () => {
      item.classList.remove('highlight');
      drawChart(id);
    });
  });
}

function setupEvents(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  let lastCol = -1;
  canvas.addEventListener('mousemove', (e) => {
    const tip = canvas.parentElement.querySelector('.chart-tooltip');
    if (tip && tip.classList.contains('pinned')) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const col = getColFromX(id, mx);
    if (col !== lastCol) { lastCol = col; drawChart(id, col); }
    showTooltip(id, col, mx, my);
  });
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const col = getColFromX(id, mx);
    pinTooltip(id, col, mx, my);
  });
  canvas.addEventListener('mouseleave', () => {
    lastCol = -1;
    const tip = canvas.parentElement.querySelector('.chart-tooltip');
    if (tip && tip.classList.contains('pinned')) return;
    drawChart(id);
    showTooltip(id, -1, 0, 0);
  });
}

function loadCompareData(name) {
  return ALL_COMPARE[name] || null;
}

function initChartFromCompare(id, compareKey, cmpData) {
  const d = cmpData[compareKey];
  if (!d || !d.aligned || d.aligned.length === 0) return;
  const { refDates, aligned } = d;
  const N = refDates.length;
  const prevHidden = charts[id] ? charts[id].hidden : new Set();
  charts[id] = { aligned, refDates, N, pad: { top: 20, right: 20, bottom: 50, left: 60 }, hidden: prevHidden };
  buildLegend(id);
  drawChart(id);
  setupEvents(id);
}

const LINE_COLORS = [
  '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
  '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf',
];

function drawMultiLine(canvasId, title, curves, kpiText) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !curves || curves.length === 0) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const pad = { top: 28, right: 16, bottom: 40, left: 60 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  // Find longest date array as reference
  let refDates = curves[0].dates;
  for (const c of curves) if (c.dates.length > refDates.length) refDates = c.dates;
  const N = refDates.length;
  if (N < 2) return;
  const dateIndex = {};
  refDates.forEach((d, i) => dateIndex[d] = i);

  // Align all curves
  const aligned = curves.map(c => {
    const arr = new Array(N).fill(null);
    c.dates.forEach((d, i) => { if (dateIndex[d] !== undefined) arr[dateIndex[d]] = c.values[i]; });
    return { name: c.name, data: arr };
  });

  // Y range
  let yMin = Infinity, yMax = -Infinity;
  for (const c of aligned) for (const v of c.data) {
    if (v !== null) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  }
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  const yPad = (yMax - yMin) * 0.06;
  yMin -= yPad; yMax += yPad;

  const xOf = i => pad.left + plotW * i / (N - 1);
  const yOf = v => pad.top + plotH * (1 - (v - yMin) / (yMax - yMin));

  // Background
  ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + plotH * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }
  // Zero line
  if (yMin < 0 && yMax > 0) {
    ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.8; ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(pad.left, yOf(0)); ctx.lineTo(W - pad.right, yOf(0)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw curves
  aligned.forEach((c, ci) => {
    ctx.strokeStyle = LINE_COLORS[ci % LINE_COLORS.length];
    ctx.lineWidth = ci === 0 ? 2.2 : 1.4;
    ctx.globalAlpha = ci === 0 ? 1.0 : 0.75;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < N; i++) {
      if (c.data[i] === null) continue;
      const x = xOf(i), y = yOf(c.data[i]);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1.0;
  });

  // Y axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = yMax - (yMax - yMin) * i / 4;
    const label = Math.abs(val) >= 10000 ? (val/10000).toFixed(1)+'w' : val.toFixed(0);
    ctx.fillText(label, pad.left - 4, pad.top + plotH * i / 4 + 3);
  }

  // X axis dates
  ctx.fillStyle = '#888'; ctx.textAlign = 'center'; ctx.font = '9px -apple-system, sans-serif';
  const xStep = Math.max(1, Math.floor(N / 6));
  for (let i = 0; i < N; i += xStep) {
    ctx.save(); ctx.translate(xOf(i), H - pad.bottom + 12); ctx.rotate(-0.35);
    ctx.fillText(refDates[i].slice(5), 0, 0); ctx.restore();
  }
  ctx.save(); ctx.translate(xOf(N-1), H - pad.bottom + 12); ctx.rotate(-0.35);
  ctx.fillText(refDates[N-1].slice(5), 0, 0); ctx.restore();

  // Title
  ctx.fillStyle = '#333'; ctx.font = 'bold 12px -apple-system, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(title, pad.left, 16);

  // Legend (right side, compact)
  if (aligned.length > 1) {
    ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'right';
    const lx = W - pad.right - 4;
    let ly = pad.top + 12;
    const shown = aligned.slice(0, 10);
    shown.forEach((c, ci) => {
      const last = c.data.findLast(v => v !== null);
      const valStr = last !== null && last !== undefined
        ? (Math.abs(last) >= 10000 ? ' ('+(last/10000).toFixed(1)+'w)' : ' ('+last.toFixed(0)+')')
        : '';
      ctx.fillStyle = LINE_COLORS[ci % LINE_COLORS.length];
      ctx.fillText(c.name + valStr, lx, ly);
      ly += 11;
    });
  }

  // KPI box
  if (kpiText) {
    ctx.font = '10px "SF Mono", Consolas, monospace'; ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    const lines = kpiText.split('\n');
    const bw = 160, bh = lines.length * 13 + 8;
    const bx = W - pad.right - bw - 2, by = H - pad.bottom - bh - 2;
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle = '#333';
    lines.forEach((line, i) => ctx.fillText(line, bx + bw - 4, by + 12 + i * 13));
  }
}

function buildKpiText(kpi) {
  if (!kpi) return '';
  const keys = ['Net_Profit','Max_Drawdown','Ann_Sharpe','Daily_Std'];
  return keys.filter(k => kpi[k]).map(k => k + ': ' + kpi[k]).join('\n');
}

const CHART_SPECS = [
  ['curve_2y', 'index_2y', 'kpi_2y', 'Equity (2Y)'],
  ['curve_6m', 'index_6m', 'kpi_6m', 'Equity (6M)'],
  ['top_2y', null, null, 'Top 10 (2Y)'],
  ['top_6m', null, null, 'Top 10 (6M)'],
  ['bottom_2y', null, null, 'Bottom 10 (2Y)'],
  ['bottom_6m', null, null, 'Bottom 10 (6M)'],
];

function getChartCurves(kpi, key, indexKey) {
  if (key === 'curve_2y' || key === 'curve_6m') {
    const curves = [];
    const main = kpi[key];
    if (main) curves.push({ name: 'Zhuli', dates: main.dates, values: main.values });
    const idx = kpi[indexKey];
    if (idx) curves.push({ name: 'Index', dates: idx.dates, values: idx.values });
    return curves.length > 0 ? curves : null;
  } else {
    const arr = kpi[key];
    return (arr && arr.length > 0) ? arr : null;
  }
}

const multiLineRegistry = {};

function drawChartsInContainer(prefix, kpi) {
  let drawn = 0;
  CHART_SPECS.forEach(([key, indexKey, kpiKey, title], i) => {
    const cid = prefix + '-dc-' + i;
    const canvas = document.getElementById(cid);
    if (!canvas) return;
    const curves = getChartCurves(kpi, key, indexKey);
    if (curves) {
      const kpiText = kpiKey ? buildKpiText(kpi[kpiKey]) : null;
      drawMultiLine(cid, title, curves, kpiText);
      multiLineRegistry[cid] = { title, curves, kpiText };
      const wrap = canvas.parentElement;
      wrap.onclick = () => openOverlay(cid, title, curves, kpiText);
      drawn++;
    } else {
      canvas.parentElement.style.display = 'none';
    }
  });
  return drawn;
}

async function drawDetailCharts(cardId, name) {
  const el = document.getElementById(cardId);
  if (!el || el.dataset.chartsDrawn) return;
  el.dataset.chartsDrawn = '1';
  const kpi = await loadChartData(name);
  if (!kpi) {
    const cg = el.querySelector('.card-charts');
    if (cg) cg.style.display = 'none';
    return;
  }
  drawChartsInContainer(cardId, kpi);
}

async function drawHeroCharts(name) {
  const kpi = await loadChartData(name);
  if (!kpi) {
    const hc = document.querySelector('.hero-charts');
    if (hc) hc.style.display = 'none';
    return;
  }
  const drawn = drawChartsInContainer('hero', kpi);
  if (drawn === 0) {
    const hc = document.querySelector('.hero-charts');
    if (hc) hc.style.display = 'none';
  }
}

function renderPage(node) {
  const app = document.getElementById('app');
  const hasChildren = node.children && node.children.length > 0;

  let bc = '<div class="breadcrumb">';
  for (let i = 0; i < navStack.length; i++) {
    bc += `<a onclick="navigateTo(${i})">${navStack[i].name}</a><span class="sep">&rsaquo;</span>`;
  }
  bc += `<span class="current">${node.name}</span><span style="margin-left:auto;font-size:12px;color:#999;">Updated: ${DATA_DATE}</span></div>`;

  let compare = '';
  if (hasChildren) {
    compare = `<div class="compare-box">
      <div class="compare-title">6M Normalized Equity (Equity / Daily_Std)</div>
      <canvas id="chart-6m" class="compare-canvas"></canvas>
      <div id="chart-6m-legend" class="compare-legend"></div>
    </div>
    <div class="compare-box">
      <div class="compare-title">2Y Normalized Equity (Equity / Daily_Std)</div>
      <canvas id="chart-2y" class="compare-canvas"></canvas>
      <div id="chart-2y-legend" class="compare-legend"></div>
    </div>`;
  }

  let hero = `<div class="hero">
    <div class="hero-header">
      <div class="hero-title">${node.name}${node.ratio ? ' <span style="font-size:14px;color:#7c3aed;">(Weight: '+fmtPct1(node.ratio)+'%)</span>' : ''}</div>
      <div class="hero-kpi">${heroKpiHtml(node.kpi)}</div>
    </div>
    <div class="hero-charts">
      <div class="hero-chart-wrap"><canvas id="hero-dc-0" class="hero-chart"></canvas></div>
      <div class="hero-chart-wrap"><canvas id="hero-dc-1" class="hero-chart"></canvas></div>
      <div class="hero-chart-wrap"><canvas id="hero-dc-2" class="hero-chart"></canvas></div>
      <div class="hero-chart-wrap"><canvas id="hero-dc-3" class="hero-chart"></canvas></div>
      <div class="hero-chart-wrap"><canvas id="hero-dc-4" class="hero-chart"></canvas></div>
      <div class="hero-chart-wrap"><canvas id="hero-dc-5" class="hero-chart"></canvas></div>
    </div>
  </div>`;

  let cards = '';
  if (hasChildren) {
    const sorted = [...node.children].sort((a, b) => {
      const sa = parseFloat((a.kpi?.kpi_6m?.Ann_Sharpe || '0').replace('w','')) || 0;
      const sb = parseFloat((b.kpi?.kpi_6m?.Ann_Sharpe || '0').replace('w','')) || 0;
      return sb - sa;
    });

    cards = `<div class="section-header">
      <span class="section-title">Components (${sorted.length})</span>
      <button class="expand-btn" onclick="toggleExpandAll()">Expand All</button>
    </div><div class="cards">`;
    sorted.forEach((child, idx) => {
      const ck6m = (child.kpi && child.kpi.kpi_6m) || {};
      const ck2y = (child.kpi && child.kpi.kpi_2y) || {};
      const isDrillable = child._drillable || (child.children && child.children.length > 0);
      const cardId = 'card-' + idx;

      cards += `<div class="card" id="${cardId}">
        <div class="card-header" onclick="toggleCard('${cardId}')">
          <span class="card-rank">#${idx+1}</span>
          ${isDrillable
            ? '<span class="card-name drillable" onclick="event.stopPropagation(); drillDown('+idx+')">'+child.name+' <span class="drill-icon">&blacktriangleright;</span></span>'
            : '<span class="card-name">'+child.name+'</span>'}
          <span class="card-ratio">${child.ratio ? fmtPct1(child.ratio) + '%' : ''}</span>
          ${ck6m.Net_Profit ? '<span class="badge badge-profit">6M Profit: '+fmt4(ck6m.Net_Profit)+'</span>' : ''}
          ${ck6m.Ann_Sharpe ? '<span class="badge badge-sharpe">6M Sharpe: '+fmt4(ck6m.Ann_Sharpe)+'</span>' : ''}
          ${ck2y.Ann_Sharpe ? '<span class="badge badge-sharpe">2Y Sharpe: '+fmt4(ck2y.Ann_Sharpe)+'</span>' : ''}
          ${ck6m.Max_Drawdown ? '<span class="badge badge-dd">6M MaxDD: '+fmt4(ck6m.Max_Drawdown)+'</span>' : ''}
          <span class="card-arrow">&blacktriangleright;</span>
        </div>
        <div class="card-body">
          <div class="card-kpi-row">
            ${kpiTableHtml('2Y KPI', ck2y)}
            ${kpiTableHtml('6M KPI', ck6m)}
          </div>
          <div class="card-charts">
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-0" class="card-chart"></canvas></div>
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-1" class="card-chart"></canvas></div>
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-2" class="card-chart"></canvas></div>
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-3" class="card-chart"></canvas></div>
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-4" class="card-chart"></canvas></div>
            <div class="card-chart-wrap"><canvas id="${cardId}-dc-5" class="card-chart"></canvas></div>
          </div>
        </div>
      </div>`;
    });
    cards += '</div>';
    node._sorted = sorted;
  }

  app.innerHTML = bc + compare + hero + cards;
  window.scrollTo(0, 0);
  Object.keys(multiLineRegistry).forEach(k => delete multiLineRegistry[k]);
  requestAnimationFrame(() => {
    drawHeroCharts(node.name);
    if (hasChildren) {
      Object.keys(charts).forEach(k => delete charts[k]);
      const cmpData = loadCompareData(node.name);
      if (cmpData) {
        initChartFromCompare('chart-6m', 'c6m', cmpData);
        initChartFromCompare('chart-2y', 'c2y', cmpData);
      } else {
        // Not in cache yet — fetch this page's compare data
        fetchRetry(hashUrl('compare/' + encodeURIComponent(node.name) + '.json'), 2).then(d => {
          if (d) { ALL_COMPARE[node.name] = d; renderCompareIfReady(); }
        });
      }
      // Prefetch chart data for top children in background
      if (node._sorted && typeof requestIdleCallback !== 'undefined') {
        const toPreload = node._sorted.slice(0, 8).map(c => c.name);
        let idx = 0;
        function preloadNext(deadline) {
          while (idx < toPreload.length && deadline.timeRemaining() > 5) {
            loadChartData(toPreload[idx++]);
          }
          if (idx < toPreload.length) requestIdleCallback(preloadNext);
        }
        requestIdleCallback(preloadNext);
      }
    }
  });
}

let cardObserver = null;
function setupCardObserver() {
  if (cardObserver) cardObserver.disconnect();
  cardObserver = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting && e.target.classList.contains('expanded')) {
        const idx = parseInt(e.target.id.replace('card-',''));
        const child = currentNode._sorted && currentNode._sorted[idx];
        if (child) drawDetailCharts(e.target.id, child.name);
      }
    }
  }, { rootMargin: '200px' });
  document.querySelectorAll('.card').forEach(c => cardObserver.observe(c));
}

let allExpanded = false;
function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.querySelector('.expand-btn');
  if (btn) btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.card').forEach(c => {
    if (allExpanded) c.classList.add('expanded');
    else c.classList.remove('expanded');
  });
  if (allExpanded) setupCardObserver();
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    const idx = parseInt(cardId.replace('card-',''));
    const child = currentNode._sorted && currentNode._sorted[idx];
    if (child) requestAnimationFrame(() => drawDetailCharts(cardId, child.name));
  }
}

function drillDown(sortedIdx) {
  allExpanded = false;
  const child = currentNode._sorted[sortedIdx];
  const loaded = loadNodeData(child.name);
  navStack.push(currentNode);
  currentNode = loaded || child;
  location.hash = child.name;
  renderPage(currentNode);
  updateNavActive();
}

function navigateTo(stackIdx) {
  allExpanded = false;
  currentNode = navStack[stackIdx];
  navStack = navStack.slice(0, stackIdx);
  location.hash = currentNode === TREE ? '' : currentNode.name;
  renderPage(currentNode);
  updateNavActive();
}

function navigateToHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash && hash !== TREE.name) {
    const loaded = loadNodeData(hash);
    if (loaded) {
      const ancestors = [];
      let cur = hash;
      while (PARENT_MAP[cur]) {
        ancestors.unshift(PARENT_MAP[cur]);
        cur = PARENT_MAP[cur];
      }
      navStack = [TREE];
      for (let i = 1; i < ancestors.length; i++) {
        const anc = loadNodeData(ancestors[i]);
        if (anc) navStack.push(anc);
      }
      currentNode = loaded;
      renderPage(currentNode);
      updateNavActive();
      return;
    }
  }
  navStack = [];
  currentNode = TREE;
  renderPage(TREE);
  updateNavActive();
}

initSidebar();
(function() {
  const resizer = document.getElementById('sidebar-resizer');
  const sidebar = document.getElementById('sidebar');
  const STORAGE_KEY = 'sidebar-width';
  const savedW = localStorage.getItem(STORAGE_KEY);
  if (savedW) sidebar.style.width = savedW + 'px';
  let startX, startW;
  function onMouseMove(e) {
    const w = Math.max(180, startW + e.clientX - startX);
    sidebar.style.width = w + 'px';
  }
  function onMouseUp() {
    localStorage.setItem(STORAGE_KEY, sidebar.offsetWidth);
    resizer.classList.remove('active');
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
  resizer.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });
})();
function unpackCompare(raw) {
  const dp = raw._d;
  for (const k in raw) {
    if (k === '_d') continue;
    const entry = {};
    for (const sk in raw[k]) {
      const s = raw[k][sk];
      const refDates = dp[s.di];
      const N = refDates.length;
      const aligned = s.a.map(a => {
        const data = a.v.slice();
        while (data.length < N) data.push(null);
        return {name: a.n, data, ratio: a.r ?? null, display_ratio: a.dr ?? null};
      });
      entry[sk] = {refDates, aligned};
    }
    ALL_COMPARE[k] = entry;
  }
}

function renderCompareIfReady() {
  if (currentNode.children && currentNode.children.length > 0) {
    const cmpData = loadCompareData(currentNode.name);
    if (cmpData) {
      initChartFromCompare('chart-6m', 'c6m', cmpData);
      initChartFromCompare('chart-2y', 'c2y', cmpData);
    }
  }
}

navigateToHash();
// Phase 1: fetch current page's compare (~50K, fast)
if (currentNode.name) {
  fetchRetry(hashUrl('compare/' + encodeURIComponent(currentNode.name) + '.json'), 2).then(d => {
    if (d) { ALL_COMPARE[currentNode.name] = d; renderCompareIfReady(); }
  });
}
// Phase 2: fetch full bundle in background (1.3M, fills ALL_COMPARE for all pages)
fetchRetry(hashUrl('compare_bundle.json'), 2).then(raw => {
  if (raw) unpackCompare(raw);
});
window.addEventListener('hashchange', () => { navigateToHash(); updateNavActive(); });
let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    Object.keys(charts).forEach(id => drawChart(id));
    Object.keys(multiLineRegistry).forEach(id => {
      const p = multiLineRegistry[id];
      if (document.getElementById(id)) drawMultiLine(id, p.title, p.curves, p.kpiText);
    });
    if (overlayParams) {
      const c = document.getElementById('overlay-canvas');
      const W = Math.min(window.innerWidth * 0.95, 1200);
      const H = Math.min(window.innerHeight * 0.88, 700);
      c.style.width = W + 'px'; c.style.height = H + 'px';
      drawMultiLine('overlay-canvas', overlayParams.title, overlayParams.curves, overlayParams.kpiText);
    }
  }, 150);
});
</script>
</div>
